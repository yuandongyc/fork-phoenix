services:
  phoenix:
    # Prebuilt image produced by .github/workflows/docker-build-fork.yml and
    # pushed to GHCR. Pull it in mainland China directly, or via the NJU mirror:
    #   docker pull ghcr.nju.edu.cn/yuandongyc/fork-phoenix:latest
    #   docker tag ghcr.nju.edu.cn/yuandongyc/fork-phoenix:latest ghcr.io/yuandongyc/fork-phoenix:latest
    image: ghcr.io/yuandongyc/fork-phoenix:latest
    depends_on:
      - db
    ports:
      - 6006:6006
      - 4317:4317
    environment:
      - PHOENIX_SQL_DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - 5432
    volumes:
      - database_data:/var/lib/postgresql/data
volumes:
  database_data:
    driver: local
