name: docker-build-fork

# Builds the Phoenix Docker image from this fork's source on GitHub-hosted
# runners (unrestricted network), saves it to a tarball, and uploads it as a
# workflow artifact so it can be downloaded and `docker load`-ed in mainland
# China without a registry, provenance, or auth.
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build image and upload tarball
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -f Dockerfile -t ghcr.io/yuandongyc/fork-phoenix:latest .

      - name: Save image to tarball
        run: docker save ghcr.io/yuandongyc/fork-phoenix:latest -o phoenix-fork.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phoenix-image
          path: phoenix-fork.tar
          if-no-files-found: error
